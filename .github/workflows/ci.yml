name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests (skip if model not trained)
        run: |
          if [ -f models/model.pkl ]; then
            python tests/test_pipeline.py
          else
            echo "models/model.pkl not found — skipping model tests (run src/train.py first)"
            exit 0
          fi
